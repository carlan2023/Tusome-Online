name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 1. Automated TDD (Unit Tests)
      - name: Run Unit Tests (TDD)
        run: npm test -- --watchAll=false

      # 2. Automated BDD (Cypress/Cucumber)
      - name: Run E2E Tests (BDD)
        uses: cypress-io/github-action@v6
        with:
          build: npm run build
          start: npm run preview # Starts your app locally for Cypress to test
          wait-on: 'http://localhost:4173' # Vite's default preview port

      # 3. Build for Production
      - name: Build Project
        run: npm run build

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
