name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel an in-progress run if a newer commit is pushed to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # FRONTEND: lint, unit/behaviour tests (Vitest + Testing Library), and build.
  # Lives in ./Tusome, so every step runs from that directory.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend - Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Tusome
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Tusome/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & behaviour tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Tusome/dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # BACKEND: Django system checks, migration smoke test, and the BDD-style
  # API test suite. Lives in ./backend.
  # CI needs DEBUG=True + a throwaway SECRET_KEY because production settings
  # refuse to start without a real key and a Postgres DATABASE_URL.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend - Django Checks & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DEBUG: "True"
      SECRET_KEY: ci-only-not-a-real-secret
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check

      - name: Migrations are complete (no model drift)
        run: python manage.py makemigrations --check --dry-run

      - name: Migrations smoke test
        run: python manage.py migrate --noinput

      - name: API tests (BDD scenarios)
        run: python manage.py test --verbosity=2

  # ---------------------------------------------------------------------------
  # DEPLOYS: CI-gated — run only on pushes to main, only after BOTH test jobs
  # pass. Frontend → Vercel, backend → Railway. Each job skips gracefully
  # (stays green) until its secrets are added:
  #   Vercel:  VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
  #   Railway: RAILWAY_TOKEN, RAILWAY_SERVICE  (service name or ID)
  # IMPORTANT: disable the Vercel/Railway GitHub auto-deploy integrations once
  # these secrets are set, otherwise every push deploys twice.
  #
  # E2E (Cypress/Playwright) intentionally omitted until specs exist — an empty
  # E2E job would fail every push. Behaviour coverage currently lives in the
  # Vitest specs (frontend) and the Django scenario tests (backend).
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [ frontend, backend ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check Vercel credentials
        id: creds
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel deploy skipped — add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID repo secrets to enable."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.creds.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        if: steps.creds.outputs.configured == 'true'
        working-directory: Tusome
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-backend:
    name: Deploy Backend to Railway
    needs: [ frontend, backend ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
    steps:
      - name: Check Railway credentials
        id: creds
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Railway deploy skipped — add RAILWAY_TOKEN and RAILWAY_SERVICE repo secrets to enable."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.creds.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Deploy to Railway
        if: steps.creds.outputs.configured == 'true'
        working-directory: backend
        run: |
          npm i -g @railway/cli
          railway up --service "$RAILWAY_SERVICE" --detach
