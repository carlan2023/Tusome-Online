name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel an in-progress run if a newer commit is pushed to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # FRONTEND: lint, unit/behaviour tests (Vitest + Testing Library), and build.
  # Lives in ./Tusome, so every step runs from that directory.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend - Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Tusome
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Tusome/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & behaviour tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Tusome/dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # BACKEND: Django system checks, migration smoke test, and the BDD-style
  # API test suite. Lives in ./backend.
  # CI needs DEBUG=True + a throwaway SECRET_KEY because production settings
  # refuse to start without a real key and a Postgres DATABASE_URL.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend - Django Checks & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DEBUG: "True"
      SECRET_KEY: ci-only-not-a-real-secret
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check

      - name: Migrations are complete (no model drift)
        run: python manage.py makemigrations --check --dry-run

      - name: Migrations smoke test
        run: python manage.py migrate --noinput

      - name: API tests (BDD scenarios)
        run: python manage.py test --verbosity=2

  # ---------------------------------------------------------------------------
  # DEPLOY: CI-gated — runs only on pushes to main AND only after both test
  # jobs pass. Requires two GitHub repo secrets:
  #   DIGITALOCEAN_ACCESS_TOKEN  (DO API token with App write scope)
  #   DIGITALOCEAN_APP_ID        (from doctl apps list, or the app's URL)
  # Until those secrets exist the job skips gracefully and stays green.
  # IMPORTANT: turn OFF Autodeploy in the DO app once secrets are set,
  # otherwise every push deploys twice.
  #
  # E2E (Cypress/Playwright) intentionally omitted until specs exist — an empty
  # E2E job would fail every push. Behaviour coverage currently lives in the
  # Vitest specs (frontend) and the Django scenario tests (backend).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to DigitalOcean
    needs: [ frontend, backend ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      DO_APP_ID: ${{ secrets.DIGITALOCEAN_APP_ID }}
    steps:
      - name: Check deploy credentials
        id: creds
        run: |
          if [ -z "$DO_TOKEN" ] || [ -z "$DO_APP_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped — set DIGITALOCEAN_ACCESS_TOKEN and DIGITALOCEAN_APP_ID repo secrets to enable CI-gated deploys."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install doctl
        if: steps.creds.outputs.configured == 'true'
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger App Platform deployment
        if: steps.creds.outputs.configured == 'true'
        run: doctl apps create-deployment "$DO_APP_ID" --wait
